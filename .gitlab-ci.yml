stages:
  - lint

ansible-lint:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip install ansible-lint
  script:
    - ansible-lint -v
  only:
    - push
    - merge_requests
  artifacts:
    reports:
      junit: ansible-lint-report.xml
    when: always
