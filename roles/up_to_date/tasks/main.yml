- name: The aptitude package is present
  ansible.builtin.apt:
    name: "{{ packages }}"
    update_cache: true
  vars:
    packages:
      - aptitude

- name: Pip packages are present
  ansible.builtin.apt:
    name: "{{ packages }}"
    update_cache: true
  vars:
    packages:
      - python3
      - python3-dev
      - python3-pip
      - python3-virtualenv

- name: The packages are updated and upgraded
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
    autoremove: true
    autoclean: true
  register: up_to_date_updated_packages

- name: List updated packages
  ansible.builtin.shell: set -o pipefail; grep -E "^$(date +%Y-%m-%d).+ (install|upgrade) " /var/log/dpkg.log | cut -d " " -f 3-5
  args:
    executable: /bin/bash
  changed_when: false
  register: up_to_date_updated_packages_list
  when: up_to_date_updated_packages.changed
  # noqa no-handler

- name: Show updated packages
  ansible.builtin.debug:
    msg: "{{ up_to_date_updated_packages_list.stdout_lines }}"
  when: up_to_date_updated_packages.changed
  # noqa no-handler

- name: Check if the file /var/run/reboot-required is present
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: up_to_date_reboot_required
  changed_when: false

- name: Reboot machine if needed
  ansible.builtin.reboot:
  when: up_to_date_reboot_required.stat.exists and not skip_reboot|default(false)
